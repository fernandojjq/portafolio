# Oracle XE 21c para desarrollo local.
# Uso:  docker compose up -d      (primer arranque tarda 2-5 min)
#       docker compose logs -f    (espera "DATABASE IS READY TO USE!")
# La imagen gvenzl/oracle-xe crea automáticamente el usuario APP_USER
# dentro del PDB XEPDB1, que es al que se conecta el API.
services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: utpb-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: admin2026        # password de SYS/SYSTEM (solo dev)
      APP_USER: utpb
      APP_USER_PASSWORD: utpb2026
    volumes:
      # Persiste los datos entre reinicios del contenedor
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 15

volumes:
  oracle-data:
